<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Food Calorie Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --text: #e6edf3;
    --muted: #8b949e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
  }
  header p {
    color: var(--muted);
    margin-top: 8px;
  }
  .search-box {
    width: 100%;
    max-width: 600px;
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
  }
  input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    background: linear-gradient(135deg, var(--accent), #2ea043);
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    color: #fff;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: none;
    white-space: pre-wrap;
    line-height: 1.8;
    font-size: 0.9rem;
  }
  .loading {
    color: var(--muted);
    text-align: center;
    margin: 20px 0;
    display: none;
  }
</style>
</head>
<body>
<header>
  <h1>🥗 Food Calorie Analyzer</h1>
  <p>Enter any food item to get detailed nutrition info</p>
</header>

<div class="search-box">
  <input type="text" id="food-input" placeholder="e.g. banana, idli, chicken breast..." />
  <button onclick="analyze()" id="btn">Analyze</button>
</div>

<div class="loading" id="loading">⏳ Analyzing nutrition data...</div>
<div class="result-card" id="result"></div>

<script>
async function analyze() {
  const food = document.getElementById('food-input').value.trim();
  if (!food) return;

  document.getElementById('btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  try {
    const response = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ food })
    });
    const data = await response.json();
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').innerHTML = data.result.replace(/### /g, '<h3>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
  } catch (err) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').innerText = 'Error analyzing food. Please try again.';
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('loading').style.display = 'none';
}

document.getElementById('food-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') analyze();
});
</script>
</body>
</html>
